---
joint_state_estimator:
  ros__parameters:
    type: linear_feedback_controller/JointStateEstimator
    state_interfaces: [arm_right_1_joint/position, arm_right_2_joint/position, arm_right_3_joint/position,
      arm_right_4_joint/position, arm_right_5_joint/position, arm_right_6_joint/position,
      arm_right_7_joint/position, arm_right_1_joint/velocity, arm_right_2_joint/velocity,
      arm_right_3_joint/velocity, arm_right_4_joint/velocity, arm_right_5_joint/velocity,
      arm_right_6_joint/velocity, arm_right_7_joint/velocity, arm_right_1_joint/torque, arm_right_2_joint/torque,
      arm_right_3_joint/torque, arm_right_4_joint/torque, arm_right_5_joint/torque, arm_right_6_joint/torque,
      arm_right_7_joint/torque]
    command_interfaces: [linear_feedback_controller/arm_right_1_joint/position, linear_feedback_controller/arm_right_2_joint/position,
      linear_feedback_controller/arm_right_3_joint/position, linear_feedback_controller/arm_right_4_joint/position,
      linear_feedback_controller/arm_right_5_joint/position, linear_feedback_controller/arm_right_6_joint/position,
      linear_feedback_controller/arm_right_7_joint/position, linear_feedback_controller/arm_right_1_joint/velocity,
      linear_feedback_controller/arm_right_2_joint/velocity, linear_feedback_controller/arm_right_3_joint/velocity,
      linear_feedback_controller/arm_right_4_joint/velocity, linear_feedback_controller/arm_right_5_joint/velocity,
      linear_feedback_controller/arm_right_6_joint/velocity, linear_feedback_controller/arm_right_7_joint/velocity,
      linear_feedback_controller/arm_right_1_joint/effort, linear_feedback_controller/arm_right_2_joint/effort,
      linear_feedback_controller/arm_right_3_joint/effort, linear_feedback_controller/arm_right_4_joint/effort,
      linear_feedback_controller/arm_right_5_joint/effort, linear_feedback_controller/arm_right_6_joint/effort,
      linear_feedback_controller/arm_right_7_joint/effort]


linear_feedback_controller:
  ros__parameters:
    type: linear_feedback_controller/LinearFeedbackController
    moving_joint_names: [arm_right_1_joint, arm_right_2_joint, arm_right_3_joint, arm_right_4_joint,
      arm_right_5_joint, arm_right_6_joint, arm_right_7_joint]
    arm_right_1_joint:
      p: 50.0
      d: 0.5
    arm_right_2_joint:
      p: 50.0
      d: 0.5
    arm_right_3_joint:
      p: 50.0
      d: 0.5
    arm_right_4_joint:
      p: 50.0
      d: 0.5
    arm_right_5_joint:
      p: 10.0
      d: 0.3
    arm_right_6_joint:
      p: 5.0
      d: 0.3
    arm_right_7_joint:
      p: 5.0
      d: 0.0
    chainable_controller:
      command_interfaces: [arm_right_1_joint_inertia_shaping_controller/arm_right_1_joint/effort,
        arm_right_2_joint_inertia_shaping_controller/arm_right_2_joint/effort, arm_right_3_joint_inertia_shaping_controller/arm_right_3_joint/effort,
        arm_right_4_joint_inertia_shaping_controller/arm_right_4_joint/effort, arm_right_5_joint_inertia_shaping_controller/arm_right_5_joint/effort,
        arm_right_6_joint_inertia_shaping_controller/arm_right_6_joint/effort, arm_right_7_joint_inertia_shaping_controller/arm_right_7_joint/effort]
      reference_prefix: ''
    joint_velocity_filter_coefficient: 0.9
    pd_to_lf_transition_duration: 0.1
    remove_gravity_compensation_effort: false
    robot_has_free_flyer: false
