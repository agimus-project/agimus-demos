---
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    gripper_action_controller:
      type: effort_controllers/GripperActionController

    force_torque_sensor_broadcaster:
      type: force_torque_sensor_broadcaster/ForceTorqueSensorBroadcaster

    net_ft_diagnostic_broadcaster:
      type: net_ft_diagnostic_broadcaster/NetFTDiagnosticBroadcaster


gripper_action_controller:
  ros__parameters:
    action_monitor_rate: 20.0
    # For now hardcoded arm_id. To be fixed later
    joint: ${arm_id}_finger_joint1
    gains.${arm_id}_finger_joint1:
      d: 10.0
      i: 0.1
      i_clamp: 0.5
      p: 20.0

force_torque_sensor_broadcaster:
  ros__parameters:
    sensor_name: ati_mini45
    state_interface_names:
    - force.x
    - force.y
    - force.z
    - torque.x
    - torque.y
    - torque.z
    frame_id: ati_mini45_measurement_reference
    topic_name: ft_data
