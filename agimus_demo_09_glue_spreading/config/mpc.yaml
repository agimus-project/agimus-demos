robot:
  name :  "panda"
  world_frame_name : "universe"
  tool_frame_name : "fr3_hand_tcp"
mpc:
  dt :  0.02 # time is in seconds
  total_time : 500
  nb_steps_horizon : 100
  solver:
    presolve:
      mu_init: 1e-1 # penalite sur les contraintes
      max_iters : 1000
      tolerance: 1e-4
    running:
      mu_init: 1e-4
      max_iters : 3
      tolerance: 1e-8
    rollout_type : aligator.ROLLOUT_LINEAR
    sa_strategy : aligator.SA_LINESEARCH_NONMONOTONE
    linear_solver_choice : aligator.LQ_SOLVER_PARALLEL
    verbose : aligator.QUIET
    num_threads : 10

  weights:
    running:
      regulation:
        joint : 1e-3 #1e-4
        vel : 1e-1 # 1e-2
        command : 1e-4 # 1e-2
      waypoints:
        pose :
          translation: 400.
          orientation : 300.
        vel :
          translation: -0.02
          orientation : -0.002
    terminal:
      regulation:
        joint : 1e-4
        vel : 1e-2
        command : -1.

    collision : 0.1 # very sensitive, max around ~ 0.1

trajectory:
  vel : 0.025



