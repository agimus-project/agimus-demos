---
running_model:
  class: IntegratedActionModelEuler
  differential:
    class: DifferentialActionModelFreeFwdDynamics
    costs:
    - name: control_reg
      update: true
      weight: 10.0
      active: true
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelControl
    - name: state_reg
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelState
    - name: goal_tracking
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelVisualServoing
          world_frame: support_link
          robot_frame: ${arm_id}_hand_tcp
          object_frame: current_object
    - name: avoid_collision
      update: true
      weight: 1.0
      publish_residual: true
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelExp
          alpha: 4e-2
          exponent: 1
        residual:
          class: ResidualDistanceCollision
          collision_pair: ['${arm_id}_hand_sc_capsule_1', big_box_link_1]
