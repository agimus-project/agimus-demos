---
deburring_path_planner:
  handles_srdf_path:
    type: string
    description: Path to definition of handles used by HPP to define all possible end configurations
      for the robot.
    read_only: true
  device:
    type: string
    description: Device to which the models will be loaded.
    default_value: cpu
    read_only: true
  rate:
    type: double
    description: Frequency [Hz] at which inference will be rerun.
    default_value: 2.0
    read_only: true
    validation:
      gt<>: [0.0]
  hpp_handle_to_ee_rot:
    type: double_array
    description: Rotation [rad] used to translate HPP handles to robot EE frame.
    default_value: [0.0, 0.0, 0.0]
    read_only: true
    validation:
      fixed_size<>: [3]
      element_bounds<>: [-3.141592655, 3.141592655]
  tool_offset_correction:
    type: double_array
    description: Frame offset [m] applied to handle frame. Offset is in HPP handle frame.
    default_value: [0.0, 0.0, 0.0]
    read_only: true
    validation:
      fixed_size<>: [3]
  tool_frame_id:
    type: string
    description: Name of the frame associated with the tool.
    read_only: true
  measurement_frame_id:
    type: string
    description: Name of the frame associated with force measurement.
    read_only: true
  world_frame_id:
    type: string
    description: Name of the frame used axs a world reference.
    read_only:
  deburred_object_frame_id:
    type: string
    description: Name of the frame associated to the deburred object.
    read_only:
  ocp_buffer_size:
    type: int
    default_value: 50
    description: Size of the trajectory buffer to be kept for the OCP.
    read_only: true
    validation:
      gt<>: 1
  moving_joints:
    type: string_array
    description: Names of the joints that are moving.
    read_only: true
  visualization:
    publish_path:
      type: bool
      description: Whether to publish the path.
      default_value: true
      read_only: true
    marker_size:
      type: double
      description: Size of the marker [m].
      default_value: 0.05
      read_only: true
    marker_color:
      type: double_array
      description: RGBA color of the markers.
      default_value: [0.0, 0.0, 1.0, 0.5]
      read_only: true
      validation:
        fixed_size<>: [4]
        element_bounds<>: [0.0, 1.0]
  max_joint_velocity:
    type: double_array
    description: Maximum angular velocity [rad/s] for each joint of the robot.
    read_only: true
    validation:
      lower_element_bounds<>: [0.0]
  ocp_dt:
    type: double
    description: Time step used by OCP.
    default_value: 0.01
    validation:
      gt<>: [0.0]
  generators_params:
    main_generator_type:
      type: string
      description: Which trajectory generator to use.
      read_only: true
      validation:
        one_of<>: [[diffusion, hpp]]
    trajectory_smoother:
      type: string
      description: Which trajectory smoother to use.
      read_only: true
      validation:
        one_of<>: [[none, interpolate, ocp]]
    deburring_generator_type:
      type: string
      description: Which deburring motion generator to use.
      read_only: plastic
      validation:
        one_of<>: [[plastic, metal]]
    use_precomputed_trajectories:
      type: bool
      description: Reuse precomputed trajectories between certain handles. Useful only for
        demonstration cases.
      default_value: false
      read_only: true
    precomputed_trajectories_path:
      type: string
      description: Path to a folder containing precomputed trajectories.
      default_value: ''
      read_only: true
    diffusion_generator:
      weights_path:
        type: string
        description: Path to the weights used by diffusion model.
        default_value: ''
        read_only: true
      sequence_length:
        type: int
        description: Output path length for diffusion model.
        default_value: 50
        read_only: true
      n_samples:
        type: int
        description: Number of trajectories to sample with diffusion model.
        default_value: 1
        read_only: true
    hpp_generator:
      handle_configs_path:
        type: string
        description: Path to precomputed final configurations of the robot used for planning.
        default_value: ''
        read_only: true
      robot_self_collision_config:
        type: string
        description: Path to srdf file with robot self collisions.
        default_value: ''
        read_only: true
      demo_config:
        type: string
        description: Path to srdf file describing the demo.
        default_value: ''
        read_only: true
      joints_to_shrink:
        type: string_array
        description: List of joints of which ranges should be shrunk.
        default_value: ['']
        read_only: true
      joint_shrink_range:
        type: double
        description: Range to which ranges of joints should be reduced.
        default_value: 1.0
        read_only: true
        validation:
          gt<>: [0.0]
          lt_eq<>: [1.0]
      robot_name:
        type: string
        description: Name of the robot used by HPP.
        default_value: ''
        read_only: true
      gripper_name:
        type: string
        description: Name of the gripper used by the demo.
        default_value: ''
        read_only: true
      deburred_object_name:
        type: string
        description: Name of the object to which handles will be attached.
        default_value: ''
        read_only: true

    ocp_smoother:
      optimizer_ocp_dt:
        type: double
        description: Time step used by optimizer OCP
        default_value: 0.1
        read_only: true
        validation:
          gt_eq<>: [0.0]
      optimizer_ocp_horizon:
        type: int
        description: Number of nodes in the optimizer OCP.
        default_value: 49
        read_only: true
        validation:
          gt<>: [0]
      running_costs:
        type: string_array
        description: Block of target YAML file that is part of `residual` block inserted to
          running cost section. Requires `class` field and it's params. Formatted in JSON
          to stand out in ROS YAML config.
        default_value: ['']
        read_only: true
      terminal_costs:
        type: string_array
        description: Block of target YAML file that is part of `residual` block inserted to
          terminal cost section. Requires `class` field and it's params. Formatted in JSON
          to stand out in ROS YAML config.
        default_value: ['']
        read_only: true
      robot_collision_links:
        type: string_array
        description: List of robot links used to generate dense collision matrix with the
          environment.
        default_value: ['']
        read_only: true
      environment_links:
        type: string_array
        description: List of environment links used to generate dense collision matrix with
          the robot.
        default_value: ['']
        read_only: true
      collision_distance:
        type: double
        description: Collision distance used in OCP config.
        default_value: 0.02
        read_only: true
        validation:
          gt_eq<>: [0.0]
      joint_shrink_range:
        type: double
        description: Range to which ranges of joints should be reduced.
        default_value: 1.0
        read_only: true
        validation:
          gt<>: [0.0]
          lt_eq<>: [1.0]
      n_threads:
        type: int
        description: Number of threads used by OCP.
        default_value: 1
        read_only: true
        validation:
          gt<>: [0]
      solver_iters:
        type: int
        description: Number of solver iterations of OCP.
        default_value: 50
        read_only: true
        validation:
          gt<>: [0]
      qp_iters:
        type: int
        description: Number of QP iterations of OCP.
        default_value: 10000
        read_only: true
        validation:
          gt<>: [0]
      use_line_search:
        type: bool
        description: Whether to use line search in OCP.
        default_value: true
        read_only: true
      callbacks:
        type: bool
        description: Whether to use callbacks in OCP.
        default_value: true
        read_only: true
      w_robot_effort:
        type: double_array
        description: Weights associated to regularization around gravity compensation torque
          of trajectory OCP.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_robot_velocity:
        type: double_array
        description: Weights associated to regularization around zero velocity of trajectory
          OCP.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      running_w_robot_configuration:
        type: double_array
        description: Weights associated to regularization around desired robot configuration
          of trajectory OCP used by running nodes.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      running_w_frame_rotation:
        type: double_array
        description: Weights associated to rotation of the `frame_of_interest` of trajectory
          OCP used by running nodes.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      running_w_frame_translation:
        type: double_array
        description: Weights associated to pose of the `frame_of_interest` of trajectory OCP
          used by running nodes.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      terminal_w_robot_configuration:
        type: double_array
        description: Weights associated to regularization around desired robot configuration
          of trajectory OCP used by terminal nodes.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      terminal_w_frame_rotation:
        type: double_array
        description: Weights associated to rotation of the `frame_of_interest` of trajectory
          OCP used by terminal nodes.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      terminal_w_frame_translation:
        type: double_array
        description: Weights associated to pose of the `frame_of_interest` of trajectory OCP
          used by terminal nodes.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      moving_joints:
        type: string_array
        description: List of moving joints optimized by the trajectory OCP.
        default_value: ['']
        read_only: true
      collision_frames_id:
        type: string_array
        description: List of collision frames of which position has to be updated.
        default_value: ['']
        read_only: true

    grasp_generator:
      linear_vel:
        type: double
        description: Linear velocity [m/s] when performing a grasp.
        read_only: true
      linear_acc:
        type: double
        description: Linear acceleration [m/s^2] when performing a grasp.
        read_only: true
      linear_jerk:
        type: double
        description: Linear jerk [m/s^3] when performing a grasp.
        read_only: true
      tool_angular_vel:
        type: double
        description: Angular velocity [rad/s] of the end effector.
        default_value: 1.0
        validation:
          gt_eq<>: [0.0]
          lt_eq<>: [2.6100]
      tool_angular_acc:
        type: double
        description: Angular acceleration [rad/s^2] of the end effector.
        default_value: 10.0
        validation:
          gt_eq<>: [0.0]
          lt_eq<>: [20.0]
      tool_angular_jerk:
        type: double
        description: Angular jerk [rad/s^3] of the end effector.
        default_value: 1000.0
        validation:
          gt_eq<>: [0.0]
          lt_eq<>: [10000.0]
      insert_joint_angle:
        type: double
        description: Angle [rad] of last joint at the end of insertion motion.
        default_value: -2.8973
        validation:
          gt_eq<>: [-2.8973]
      retract_joint_angle:
        type: double
        description: Angle [rad] of last joint at the end of retraction motion.
        default_value: -2.8973
        validation:
          gt_eq<>: [-2.8973]
    plastic_deburring_generator:
      angle:
        type: double
        description: Angle at which the circle is generated.
        default_value: 5.0
        validation:
          gt_eq<>: [0.0]
      frequency:
        type: double
        description: Frequency at which circle is performed.
        default_value: 0.1
        validation:
          gt_eq<>: [0.0]
      slope_circles:
        type: int
        description: Number of circle to slope up with the deburring angle.
        default_value: 1
        validation:
          gt_eq<>: [1]
      n_circles:
        type: int
        description: Number of circles to draw.
        default_value: 2
        validation:
          gt_eq<>: [2]
      desired_force:
        type: double
        description: Desired force [N] applied by `frame_of_interest` in the direction of
          the handle.
        default_value: 1.0
        validation:
          gt_eq<>: [0.0]
      force_ramp:
        type: double
        description: Time [s] to ramp up and down forces.
        default_value: 2.0
        validation:
          gt_eq<>: [0.0]
    metal_deburring_generator:
      tool_angular_vel:
        type: double
        description: Angular velocity [rad/s] of the end effector.
        default_value: 1.0
        validation:
          gt_eq<>: [0.0]
          lt_eq<>: [2.6100]
      tool_angular_acc:
        type: double
        description: Angular acceleration [rad/s^2] of the end effector.
        default_value: 10.0
        validation:
          gt_eq<>: [0.0]
          lt_eq<>: [20.0]
      tool_angular_jerk:
        type: double
        description: Angular jerk [rad/s^3] of the end effector.
        default_value: 1000.0
        validation:
          gt_eq<>: [0.0]
          lt_eq<>: [10000.0]
      tool_joint_start_angle:
        type: double
        description: Starting angle [rad] of the end effector.
        default_value: -2.8973
        validation:
          gt_eq<>: [-2.8973]
      tool_joint_end_angle:
        type: double
        description: End angle [rad] of the end effector.
        default_value: 2.8973
        validation:
          lt_eq<>: [2.8973]
      positioning_time:
        type: double
        description: Time [s] to wait when positioning the tool before deburring.
        default_value: 1.0
        validation:
          gt_eq<>: [0.0]
      positioning_force:
        type: double
        description: Force [N] exerted to position the tool in the hole.
        default_value: 2.0
        validation:
          gt_eq<>: [0.0]
      deburring_force:
        type: double
        description: Force [N] exerted when performing deburring.
        default_value: 2.0
        validation:
          gt_eq<>: [0.0]
      force_rate_up:
        type: double
        description: Force rate  [N/s] at which the force is increased.
        default_value: 2.0
        validation:
          gt_eq<>: [0.0]
      force_rate_down:
        type: double
        description: Force rate  [N/s] at which the force is increased.
        default_value: 2.0
        validation:
          gt_eq<>: [0.0]
      n_repeat:
        type: int
        description: How many times to repeat the motion.
        default_value: 2
        validation:
          gt_eq<>: [0]
  weights:
    schedule:
      interpolation_time:
        type: double
        description: Time to interpolate between weights.
        default_value: 1.0
        validation:
          gt_eq<>: [0.0]
    follow_joint_trajectory:
      w_robot_configuration:
        type: double_array
        description: Weights associated to regularization around desired robot configuration.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_robot_velocity:
        type: double_array
        description: Weights associated to regularization around desired robot velocity.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_robot_effort:
        type: double_array
        description: Weights associated to regularization around gravity compensation torque.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_frame_rotation:
        type: double_array
        description: Weights associated to rotation of the `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_frame_translation:
        type: double_array
        description: Weights associated to pose of the `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_desired_force:
        type: double_array
        description: Weights associated to force applied by `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_collision_avoidance:
        type: double
        description: Weight os soft collision cost.
        validation:
          gt_eq<>: [0.0]
    insert_retract_tool:
      w_robot_configuration:
        type: double_array
        description: Weights associated to regularization around desired robot configuration.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_robot_velocity:
        type: double_array
        description: Weights associated to regularization around desired robot velocity.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_robot_effort:
        type: double_array
        description: Weights associated to regularization around gravity compensation torque.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_frame_rotation:
        type: double_array
        description: Weights associated to rotation of the `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_frame_translation:
        type: double_array
        description: Weights associated to pose of the `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_desired_force:
        type: double_array
        description: Weights associated to force applied by `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_collision_avoidance:
        type: double
        description: Weight os soft collision cost.
        validation:
          gt_eq<>: [0.0]
    deburring_motion:
      w_robot_configuration:
        type: double_array
        description: Weights associated to regularization around desired robot configuration.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_robot_velocity:
        type: double_array
        description: Weights associated to regularization around desired robot velocity.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_robot_effort:
        type: double_array
        description: Weights associated to regularization around gravity compensation torque.
        validation:
          not_empty<>: []
          lower_element_bounds<>: [0.0]
      w_frame_rotation:
        type: double_array
        description: Weights associated to rotation of the `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_frame_translation:
        type: double_array
        description: Weights associated to pose of the `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_desired_force:
        type: double_array
        description: Weights associated to force applied by `frame_of_interest`.
        validation:
          fixed_size<>: [3]
          lower_element_bounds<>: [0.0]
      w_collision_avoidance:
        type: double
        description: Weight os soft collision cost.
        validation:
          gt_eq<>: [0.0]
