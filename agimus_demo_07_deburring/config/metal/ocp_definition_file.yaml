---
running_model:
  class: IAMSoftContactAugmented
  differential:
    class: DAMSoftContactAugmentedFwdDynamics
    Kp: [6000, 6000, 6000]
    Kv: [100, 100, 100]
    frame_id: ati_mini45_measurement_reference
    oPc: [0.0, 0.0, -0.073915]
    with_gravity_torque_reg: true
    enabled_directions: [true, true, true]
    ref: LOCAL_WORLD_ALIGNED
    cost_ref: LOCAL_WORLD_ALIGNED
    costs:
    - name: state_reg
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelState
    - name: frame_rot_tracking_tool
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelFrameRotationStatic
          frame_id: fer_ati_mini45_with_compact_camera_tool
    - name: frame_pose_tracking_tool
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelFrameTranslationStatic
          frame_id: fer_ati_mini45_with_compact_camera_tool

terminal_model:
  class: IAMSoftContactAugmented
  differential:
    class: DAMSoftContactAugmentedFwdDynamics
    Kp: [6000, 6000, 6000]
    Kv: [100, 100, 100]
    frame_id: ati_mini45_measurement_reference
    oPc: [0.0, 0.0, -0.073915]
    with_gravity_torque_reg: false
    enabled_directions: [true, true, true]
    ref: LOCAL_WORLD_ALIGNED
    cost_ref: LOCAL_WORLD_ALIGNED
    costs:
    - name: state_reg
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelState
    - name: frame_rot_tracking_tool
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelFrameRotationStatic
          frame_id: fer_ati_mini45_with_compact_camera_tool
    - name: frame_pose_tracking_tool
      update: true
      weight: 1.0
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelWeightedQuad
          weights: 1.0
        residual:
          class: ResidualModelFrameTranslationStatic
          frame_id: fer_ati_mini45_with_compact_camera_tool
    - name: soft_collision_0
      update: true
      weight: 1.0
      publish_residual: true
      cost:
        class: CostModelResidual
        activation:
          class: ActivationModelExp
          alpha: 4e-2
          exponent: 2
        residual:
          class: ResidualDistanceCollision
          collision_pair: [fer_ati_mini45_with_compact_camera_tool_capsule_0, pylone_sc_link_18]
    constraints:
      # FT sensor to side
    - name: collision_0
      active: true
      constraint:
        class: ConstraintModelResidual
        lower: 0.0
        upper: inf
        residual:
          class: ResidualDistanceCollision
          collision_pair: [fer_ati_mini45_with_compact_camera_tool_capsule_0, pylone_sc_link_capsule_4]
    - name: collision_7
