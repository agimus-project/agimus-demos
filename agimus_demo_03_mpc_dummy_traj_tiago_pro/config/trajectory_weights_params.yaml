---
simple_trajectory_publisher:
  ros__parameters:
    # trajectory_name: sine_wave_cartesian_space # Oscillates the end-effector.
    trajectory_name: sine_wave_configuration_space # Oscillates the joints.
    ee_frame_name: arm_right_7_joint
    w_q: [0.001]
    w_qdot: [0.001]
    w_qddot: [0.000001]
    w_robot_effort: [1.0]
    w_pose: [1.0]
    sine_wave:
      period: 10.0
      scale_duration: 1.0
      amplitude: 0.2
